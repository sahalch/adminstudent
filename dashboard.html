<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
    font-family:Arial;
    padding:20px;
}

#logout{
    float:right;
}

input,select{
    padding:8px;
    margin:5px;
}

button{
    padding:8px;
}

</style>

</head>
<body>

<button id="logout" onclick="logout()">
Sign Out
</button>

<div id="content"></div>

<script>

let role =
localStorage.getItem("role");

let content =
document.getElementById("content");

let editId = -1;

if(role==="admin"){
    adminPage();
}
else if(role==="student"){
    studentPage();
}
else{
    location.href="login.html";
}

function logout(){

    localStorage.clear();

    location.href="login.html";
}
function adminPage(){

content.innerHTML = `

<h2>Admin Panel</h2>

<input id="userid"
placeholder="Student ID">

<input id="password"
placeholder="Password">

<select id="course">
    <option>MERN Stack</option>
    <option>Python</option>
</select>

<button onclick="saveStudent()">
Save
</button>

<h3>Students</h3>

<ul id="list"></ul>

`;

loadStudents();

}

async function saveStudent(){

let userid =
document.getElementById("userid").value;

let password =
document.getElementById("password").value;

let course =
document.getElementById("course").value;

let student = {
    userid,
    password,
    course
};

if(editId==-1){

await fetch("/students",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(student)
});

}
else{

await fetch("/students/"+editId,{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(student)
});

editId=-1;
}

loadStudents();

}

async function loadStudents(){

let res =
await fetch("/students");

let students =
await res.json();

let list = "";

students.forEach((s,index)=>{

list += `

<li>

${s.userid}
|
${s.course}

<button onclick="editStudent(${index})">
Edit
</button>

<button onclick="deleteStudent(${index})">
Delete
</button>

</li>

`;

});

document.getElementById("list").innerHTML =
list;

window.students = students;

}

function editStudent(id){

editId=id;

document.getElementById("userid").value =
students[id].userid;

document.getElementById("password").value =
students[id].password;

document.getElementById("course").value =
students[id].course;

}

async function deleteStudent(id){

await fetch("/students/"+id,{
method:"DELETE"
});

loadStudents();

}
function studentPage(){

let student =
JSON.parse(
localStorage.getItem("student")
);

content.innerHTML = `

<h2>Student Dashboard</h2>

<h3>User ID :
${student.userid}</h3>

<h3>Course :
${student.course}</h3>

`;

}

</script>

</body>
</html>
