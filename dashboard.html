<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#eef2f7;
}

.header{
    background:#2563eb;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h2{
    font-size:24px;
}

#logout{
    background:#ef4444;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
}

#logout:hover{
    background:#dc2626;
}

.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

input,select{

    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;

}

button{

    padding:10px 18px;
    border:none;
    border-radius:5px;
    cursor:pointer;

}

.saveBtn{
    background:#2563eb;
    color:white;
}

.saveBtn:hover{
    background:#1d4ed8;
}

.editBtn{
    background:#f59e0b;
    color:white;
}

.deleteBtn{
    background:#ef4444;
    color:white;
}

ul{
    list-style:none;
    margin-top:20px;
}

li{

    background:#f8fafc;
    margin:10px 0;
    padding:12px;
    border-radius:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;

}

.card{

    background:#f8fafc;
    padding:20px;
    border-radius:8px;
    margin-top:20px;

}

.card h3{
    margin:10px 0;
}

</style>

</head>

<body>

<div class="header">

<h2>Student Management System</h2>

<button id="logout" onclick="logout()">
Sign Out
</button>

</div>

<div class="container">

<div id="content"></div>

</div>

<script>

let role =
localStorage.getItem("role");

let content =
document.getElementById("content");

let editId = -1;

if(role==="admin"){
    adminPage();
}
else if(role==="student"){
    studentPage();
}
else{
    location.href="login.html";
}
function logout(){
    localStorage.clear();
    location.href="login.html";
}
function adminPage(){
content.innerHTML=`
<h2>Admin Panel</h2>
<br>
<input id="userid"
placeholder="Student User ID">
<input id="password"
placeholder="Student Password">

<select id="course">

<option>MERN Stack</option>

<option>Python</option>

</select>

<button class="saveBtn"
onclick="saveStudent()">

Save Student

</button>

<h3 style="margin-top:30px;">
Registered Students
</h3>

<ul id="list"></ul>

`;
loadStudents();
}
async function saveStudent(){
let student={
userid:
document.getElementById("userid").value,
password:
document.getElementById("password").value,
course:
document.getElementById("course").value
};
if(editId==-1){
await fetch("/students",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(student)
});
}
else{
await fetch("/students/"+editId,{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(student)
});
editId=-1;
}
document.getElementById("userid").value="";
document.getElementById("password").value="";
loadStudents();
}
async function loadStudents(){
let res=
await fetch("/students");
let students=
await res.json();
window.students=students;
let list="";
students.forEach((s,index)=>{
list+=`
<li>
<div>
<b>${s.userid}</b>
<br>
${s.course}
</div>
<div>
<button class="editBtn"
onclick="editStudent(${index})">
Edit
</button>
<button class="deleteBtn"
onclick="deleteStudent(${index})">
Delete
</button>
</div>
</li>
`;
});
document.getElementById("list").innerHTML=list;
}
function editStudent(id){
editId=id;
document.getElementById("userid").value=
students[id].userid;
document.getElementById("password").value=
students[id].password;
document.getElementById("course").value=
students[id].course;
}
async function deleteStudent(id){
await fetch("/students/"+id,{
method:"DELETE"
});
loadStudents();
}
function studentPage(){
let student=
JSON.parse(
localStorage.getItem("student")
);
content.innerHTML=`
<h2>Student Dashboard</h2>
<div class="card">
<h3>User ID : ${student.userid}</h3>
<h3>Course : ${student.course}</h3>
</div>
`;
}
</script>
</body>
</html>
